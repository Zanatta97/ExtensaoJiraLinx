<!doctype html>
<html lang="pt-BR">
  <head>
    <title>Pesquisa JIRA</title>
    <link rel="shortcut icon" href="icons/linx32.png" type="image/png" />
    <link
      href="https://fonts.googleapis.com/css?family=Noto Sans"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <style>
      @import url("styles.css");
    </style>
  </head>
  <body>
    <main class="popup-shell">
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">LINX Automotivo</p>
          <h1>Pesquisa JIRA</h1>
        </div>
      </section>

      <section class="card">
        <div class="field-group">
          <label for="autoInput">Número da AUTO</label>
          <input type="number" id="autoInput" placeholder="Ex: 99999" />
        </div>

        <div class="field-divider"><span>ou</span></div>

        <div class="field-group">
          <label for="textoInput">Pesquisar Descrição</label>
          <input
            type="text"
            id="textoInput"
            placeholder="Ex: texto a pesquisar"
          />
        </div>

        <button id="btnPesquisar">Pesquisar no Jira</button>

        <p class="helper-note">
          Use apenas um campo por vez. O login e o redirecionamento são
          automáticos.
        </p>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
